<body>
  
  <div id="calculator">
    <section id="cubic-solver">
      <h2>Cubic Solver</h2>
      <label>a-value <input type="number" id="a-value"></label>
      <label>b-value <input type="number" id="b-value"></label>
      <label>c-value <input type="number" id="c-value"></label>
      <label>d-value <input type="number" id="d-value"></label>
      <button id="solveCubic">Solve Cubic</button>
    </section>

    <section id="result">
      <h2 id="equation"></h2>
      <table>
        <tr>
          <th>p</th>
          <th>q</th>
          <th>discriminant</th>
        </tr>
        <tr>
          <td id="p"></td>
          <td id="q"></td>
          <th id="discriminant"></th>
          
        </tr>
      </table>
      <table>
        <tr>
          <th>root1 x</th>
          <th>root1 y</th>
          <th>root2 x</th>
          <th>root2 y</th>
          <th>root3 x</th>
          <th>root3 y</th>
          
        </tr>
        <tr>
          <td id="root1"></td>
          <td>0</td>
          <td id="root2"></td>
          <td>0</td>
          <td id="root3"></td>
          <td>0</td>
        </tr>
      </table>
    </section>

    <div class="graph-container">
      <canvas id="graph" width="600" height="600"></canvas>
    </div>

  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
